world:
  height: 10
  width: 10
  step_time: 0.3
  sample_time: 0.3
  collision_mode: 'reactive'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    vel_min: [0, -1.0]
    vel_max: [1.0, 1.0]
    # agent 在 U 形凹槽内部（右侧），朝右
    state: [7.5, 5.0, 0, 0]
    # goal 在开口外左侧
    goal: [9.0, 5.0, 0]
    arrive_mode: position
    goal_threshold: 0.3
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 7
        angle_range: 3.14
        number: 180
        noise: True
        std: 0.08
        angle_std: 0.1
        offset: [0, 0, 0]
        alpha: 0.3
    plot:
      show_trajectory: True

obstacle:
  # 右墙（竖向，封堵U形底部）: 中心(8.0, 5.0)
  - shape: {name: 'rectangle', length: 0.3, width: 6.0}
    state: [8.0, 5.0, 0]
    kinematics: {name: 'static'}

  # 上墙（横向）: 从右墙向左延伸，中心(5.15, 7.0)
  - shape: {name: 'rectangle', length: 5.7, width: 0.3}
    state: [5.15, 7.0, 0]
    kinematics: {name: 'static'}

  # 下墙（横向）: 从右墙向左延伸，中心(5.15, 3.0)
  - shape: {name: 'rectangle', length: 5.7, width: 0.3}
    state: [5.15, 3.0, 0]
    kinematics: {name: 'static'}

  # 世界边界
  - shape: {name: 'linestring', vertices: [[0,0],[10,0],[10,10],[0,10],[0,0]]}
    kinematics: {name: 'static'}
    state: [0, 0, 0]
