world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  collision_mode: 'reactive'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    vel_min: [0, -1.0]
    vel_max: [1.0, 1.0]
    state: [2, 2, 0, 0]
    goal: [8, 8, 0]
    arrive_mode: position
    goal_threshold: 0.3
    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 10
        angle_range: 3.14
        number: 100
        noise: True
        std: 0.08
        angle_std: 0.1
        offset: [0, 0, 0]
        alpha: 0.3
    plot:
      show_trajectory: True

obstacle:
  - number: 5
    kinematics: {name: 'static'}
    distribution: {name: 'random', range_low: [1,1,-3.14], range_high: [9,9,3.14]}
    shape:
      - {name: 'circle', radius: 0.8, random_shape: True}
  - shape: {name: 'linestring', vertices: [[0,0],[10,0],[10,10],[0,10],[0,0]]}
    kinematics: {name: 'static'}
    state: [0, 0, 0]
