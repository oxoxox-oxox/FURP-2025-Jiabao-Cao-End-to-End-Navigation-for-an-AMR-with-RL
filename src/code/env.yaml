world:
  height: 42
  width: 53
  step_time: 0.1
  sample_time: 0.1
  offset: [-2, 5]
  collision_mode: 'stop'  # 'stop', 'unobstructed', 'reactive', unobstructed_obstacles
  control_mode: 'auto'  # 'keyboard', 'auto'


robot:
  - kinematics: {name: 'diff'} 
    shape: {name: 'rectangle', length: 1.6, width: 2.0}
    state: [1, 25, 0]  
    goal: [40, 25, 0] 
    vel_min: [-8, -3.14]
    vel_max: [8, 3.14]
    goal_threshold: 0.4
    plot:
      show_goal: False

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 10
        angle_range: 3.1415926
        number: 36
        noise: False
        has_velocity: True
       
obstacle:
  - number: 5
    distribution: {name: 'random', range_low: [5, 20, -3.14], range_high: [45, 35, 3.14]}
    kinematics: {name: 'omni'}
    shape:
      - {name: 'polygon', vertices: [[-1, -1], [1, -1], [1, 1], [-1, 1]]}  # radius
      - {name: 'circle', radius: 0.5}  # radius
      - {name: 'circle', radius: 0.5}  # radius

    behavior: {name: 'rvo', vxmax: 0.2, vymax: 0.2, accer: 0.2, factor: 0.5, range_low: [5, 20, -3.14], range_high: [45, 35, 3.14], wander: True}

    vel_min: [-0.2, -0.2]
    vel_max: [0.2, 0.2]
    arrive_mode: position
    goal_threshold: 0.3
    plot:
      show_goal: False
      show_arrow: True

  
    
