world:
  height: 10
  width: 10
  step_time: 0.1
  offset: [5, 5]

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [0, 0, 0]
    goal: [4, 4, 0]
    sensors:
      - name: 'lidar2d'
        range_min: 0.1
        range_max: 5.0
        angle_range: 3.14159
        number: 36
        noise: False

obstacle:
  - shape: {name: 'circle', radius: 0.3}
    state: [2, 2, 0]
  - shape: {name: 'circle', radius: 0.3}
    state: [-1, 3, 0]